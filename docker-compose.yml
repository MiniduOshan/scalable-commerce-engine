version: '3.9'

services:
  app:
    build: ./app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
    working_dir: /app
    command: node src/server.js
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scalable_commerce
    ports:
      - "3307:3306"

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"